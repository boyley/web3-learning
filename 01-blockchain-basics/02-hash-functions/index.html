<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>02 · 哈希函数 · 雪崩效应 Demo</title>
  <style>
    body { font-family: -apple-system, "PingFang SC", sans-serif; max-width: 820px; margin: 24px auto; padding: 0 16px; line-height: 1.6; color: #222; }
    textarea { width: 100%; height: 80px; font-family: monospace; padding: 8px; box-sizing: border-box; }
    .out { font-family: monospace; word-break: break-all; padding: 10px; background: #f6f6f6; border-radius: 6px; margin: 8px 0; }
    .bit { display: inline-block; width: 9px; }
    .same { color: #bbb; }
    .diff { color: #d33; font-weight: bold; }
    h1 { font-size: 20px; }
    .meta { color: #555; }
  </style>
</head>
<body>
  <h1>SHA-256 哈希：改一个字，指纹全变（雪崩效应）</h1>
  <p class="meta">在下面两个框输入几乎相同的文字（比如只差一个字），观察它们的哈希差异。红色 = 该位不同。</p>

  <label>输入 A：</label>
  <textarea id="a" oninput="run()">Alice 给 Bob 转账 100 元</textarea>
  <div class="out" id="ha"></div>

  <label>输入 B：</label>
  <textarea id="b" oninput="run()">Alice 给 Bob 转账 900 元</textarea>
  <div class="out" id="hb"></div>

  <p id="stat" class="meta"></p>

  <script>
    // 用浏览器内置 SubtleCrypto 计算 SHA-256，返回 64 位十六进制字符串
    async function sha256(text) {
      const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text));
      return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, "0")).join("");
    }
    // 统计两个哈希有多少 bit 不同
    function bitDiff(a, b) {
      let d = 0;
      for (let i = 0; i < a.length; i++) {
        const x = parseInt(a[i], 16) ^ parseInt(b[i], 16);
        d += (x.toString(2).match(/1/g) || []).length;
      }
      return d;
    }
    async function run() {
      const ta = document.getElementById("a").value;
      const tb = document.getElementById("b").value;
      const ha = await sha256(ta);
      const hb = await sha256(tb);
      // 逐字符渲染，不同的字符标红
      const ra = [], rb = [];
      for (let i = 0; i < 64; i++) {
        const cls = ha[i] === hb[i] ? "same" : "diff";
        ra.push(`<span class="${cls}">${ha[i]}</span>`);
        rb.push(`<span class="${cls}">${hb[i]}</span>`);
      }
      document.getElementById("ha").innerHTML = ra.join("");
      document.getElementById("hb").innerHTML = rb.join("");
      const d = bitDiff(ha, hb);
      document.getElementById("stat").innerHTML =
        `两个哈希共 256 bit，其中 <b>${d}</b> bit 不同（约 ${(d / 256 * 100).toFixed(1)}%）。` +
        (ta === tb ? " 两者相同 → 哈希完全一致（确定性）。" : " 微小改动导致约一半 bit 翻转 —— 这就是雪崩效应。");
    }
    run();
  </script>
</body>
</html>
