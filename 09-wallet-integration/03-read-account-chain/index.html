<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>03 · 读账户 / 链 / 余额（Read Account, Chain, Balance）</title>
<style>
  :root{--bg:#0f1420;--card:#1a2232;--fg:#e6edf3;--muted:#8b98a9;--accent:#f6851b;--ok:#3fb950;--err:#f85149;--border:#2d3648}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--fg);line-height:1.6;padding:24px}
  .wrap{max-width:820px;margin:0 auto}
  h1{font-size:1.5rem} h2{font-size:1.1rem;border-bottom:1px solid var(--border);padding-bottom:6px;margin-top:28px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin:16px 0}
  button{background:var(--accent);color:#111;border:0;border-radius:8px;padding:10px 16px;font-weight:600;cursor:pointer;font-size:.95rem;margin:4px 6px 4px 0}
  button:hover{opacity:.9} button:disabled{opacity:.4;cursor:not-allowed}
  pre{background:#0b0f17;border:1px solid var(--border);border-radius:8px;padding:14px;overflow:auto;font-size:.85rem}
  code{color:var(--accent)}
  .row{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
  .kv{display:grid;grid-template-columns:140px 1fr;gap:8px;font-size:.9rem}
  .kv div:nth-child(odd){color:var(--muted)}
  input{background:#0b0f17;border:1px solid var(--border);color:var(--fg);border-radius:6px;padding:8px;font-size:.9rem;width:100%}
  .ok{color:var(--ok)} .err{color:var(--err)} .muted{color:var(--muted)}
  .warn{background:#3a2a12;border:1px solid #7a5a24;border-radius:8px;padding:12px;font-size:.9rem}
  #log{min-height:60px}
</style>
</head>
<body>
<div class="wrap">
  <h1>03 · 读账户 / 链 / 余额（Read Account, Chain, Balance）</h1>
  <p class="muted">用只读 RPC 查询已授权账户、当前网络与地址余额，全程不弹窗、不动资产。</p>

  <div class="warn">
    ⚠️ 本模块全部是<strong>只读方法</strong>：不会弹出签名/授权窗口，不会花费任何资产，是最安全的一类调用。请把 MetaMask 网络切到 <strong>Sepolia</strong> 再体验。
  </div>

  <!-- 只读账户与链 -->
  <div class="card">
    <div class="row">
      <button id="btnAccounts">读账户 eth_accounts（不弹窗）</button>
      <button id="btnChain">读网络 eth_chainId</button>
    </div>
    <div class="kv" style="margin-top:14px">
      <div>已授权账户</div><div id="account" class="muted">—</div>
      <div>当前网络</div><div id="chain" class="muted">—</div>
    </div>
  </div>

  <!-- 查余额 -->
  <div class="card">
    <div class="row" style="margin-bottom:10px">
      <input id="addr" placeholder="输入要查询余额的地址（0x...），留空则用已授权账户">
    </div>
    <button id="btnBalance">查询余额 eth_getBalance</button>
    <div class="kv" style="margin-top:14px">
      <div>余额</div><div id="balance" class="muted">—</div>
    </div>
  </div>

  <div class="card">
    <h2 style="margin-top:0;border:0">日志</h2>
    <pre id="log"></pre>
  </div>
</div>

<script>
// ======================================================================
// 模块 03：读账户 / 链 / 余额（全部只读，不弹窗）
// ----------------------------------------------------------------------
// 三个核心只读方法：
//   eth_accounts   —— 返回「已授权」账户数组，不弹窗；未连接时返回空数组 []
//   eth_chainId    —— 返回当前链的 chainId（十六进制字符串，如 '0xaa36a7'）
//   eth_getBalance —— params: [address, 'latest']，返回余额（wei，十六进制）
// ======================================================================

const logEl = document.getElementById('log');
const accountEl = document.getElementById('account');
const chainEl = document.getElementById('chain');
const balanceEl = document.getElementById('balance');
const addrEl = document.getElementById('addr');

function log(msg, cls) {
  const time = new Date().toLocaleTimeString();
  const line = document.createElement('div');
  if (cls) line.className = cls;
  line.textContent = `[${time}] ${msg}`;
  logEl.appendChild(line);
}

function explainError(code) {
  const map = {
    4001: '用户拒绝了请求', 4100: '未授权', 4200: '钱包不支持该方法',
    4900: '钱包已断开', 4901: '钱包未连接到目标链', 4902: '目标链未添加',
  };
  return map[code] || '未知错误码';
}

// chainId（十六进制）→ 网络名映射表。本系列只用 Sepolia。
const CHAIN_NAMES = {
  '0x1': 'Ethereum 主网（Mainnet）',
  '0xaa36a7': 'Sepolia 测试网 ✅',   // 11155111
  '0x5': 'Goerli 测试网（已弃用）',
  '0x2105': 'Base 主网',
  '0x89': 'Polygon 主网',
};

// 把 wei（十六进制字符串）转成人类可读的 ether。
// 1 ether = 10^18 wei。用 BigInt 做整数除法，避免 Number 精度丢失。
function weiHexToEther(weiHex) {
  const wei = BigInt(weiHex);              // 十六进制字符串可直接被 BigInt 解析
  const ONE = 10n ** 18n;                   // 1 ether 对应的 wei 数
  const intPart = wei / ONE;                // 整数部分（多少个完整 ether）
  const fracPart = wei % ONE;               // 余下的 wei（小数部分）
  // 把小数部分补足 18 位，再截取前 6 位展示，并去掉末尾多余的 0
  let frac = fracPart.toString().padStart(18, '0').slice(0, 6).replace(/0+$/, '');
  return frac ? `${intPart}.${frac}` : `${intPart}`;
}

// ① eth_accounts：只读已授权账户，不弹窗
async function readAccounts() {
  if (typeof window.ethereum === 'undefined') { log('未检测到钱包，请安装 MetaMask。', 'err'); return; }
  try {
    log('调用 eth_accounts（只读，不弹窗）…');
    const accounts = await window.ethereum.request({ method: 'eth_accounts' });
    if (accounts.length === 0) {
      accountEl.textContent = '（空，尚未连接）';
      accountEl.className = 'muted';
      log('eth_accounts 返回空数组 [] —— 说明本站还没被授权连接。请先到模块 02 连接钱包。', 'err');
      log('对比：eth_requestAccounts 会弹窗请求授权；eth_accounts 只静默读取已授权结果。', 'muted');
    } else {
      accountEl.textContent = accounts[0];
      accountEl.className = 'ok';
      addrEl.value = accounts[0];   // 顺手把地址填进余额输入框
      log(`eth_accounts 返回 ${accounts.length} 个已授权账户，当前：${accounts[0]}`, 'ok');
    }
  } catch (err) {
    log(`读账户失败（code ${err.code}：${explainError(err.code)}）：${err.message}`, 'err');
  }
}

// ② eth_chainId：读当前网络
async function readChain() {
  if (typeof window.ethereum === 'undefined') { log('未检测到钱包，请安装 MetaMask。', 'err'); return; }
  try {
    log('调用 eth_chainId…');
    const chainIdHex = await window.ethereum.request({ method: 'eth_chainId' });
    const chainIdDec = parseInt(chainIdHex, 16);         // 十六进制 → 十进制
    const name = CHAIN_NAMES[chainIdHex] || '未知网络';
    chainEl.textContent = `${name}（${chainIdHex} = ${chainIdDec}）`;
    chainEl.className = chainIdHex === '0xaa36a7' ? 'ok' : 'muted';
    log(`当前网络：${name}，chainId=${chainIdHex}（十进制 ${chainIdDec}）`, 'ok');
    if (chainIdHex !== '0xaa36a7') {
      log('提示：本系列约定只用 Sepolia 测试网，请在 MetaMask 里切换到 Sepolia。', 'err');
    }
  } catch (err) {
    log(`读网络失败（code ${err.code}：${explainError(err.code)}）：${err.message}`, 'err');
  }
}

// ③ eth_getBalance：查地址余额
async function readBalance() {
  if (typeof window.ethereum === 'undefined') { log('未检测到钱包，请安装 MetaMask。', 'err'); return; }
  const address = (addrEl.value || '').trim();
  // 极简地址格式校验：0x 开头 + 40 位十六进制
  if (!/^0x[0-9a-fA-F]{40}$/.test(address)) {
    log('请输入合法的地址（0x 开头共 42 个字符），或先点「读账户」自动填入。', 'err');
    return;
  }
  try {
    log(`调用 eth_getBalance，params=['${address}', 'latest']…`);
    // 第二个参数 'latest' 表示查询「最新区块」时的余额
    const weiHex = await window.ethereum.request({
      method: 'eth_getBalance',
      params: [address, 'latest'],
    });
    const ether = weiHexToEther(weiHex);
    balanceEl.textContent = `${ether} ETH`;
    balanceEl.className = 'ok';
    log(`余额原始值 ${weiHex}（wei，十六进制）→ 换算得 ${ether} ETH`, 'ok');
  } catch (err) {
    log(`查余额失败（code ${err.code}：${explainError(err.code)}）：${err.message}`, 'err');
  }
}

// 监听 chainChanged：用户在钱包里切网络时实时更新（chainId 为十六进制字符串）
if (window.ethereum) {
  window.ethereum.on('chainChanged', (chainIdHex) => {
    const name = CHAIN_NAMES[chainIdHex] || '未知网络';
    log(`事件 chainChanged：网络已切换为 ${name}（${chainIdHex}）`, 'ok');
    chainEl.textContent = `${name}（${chainIdHex} = ${parseInt(chainIdHex, 16)}）`;
    chainEl.className = chainIdHex === '0xaa36a7' ? 'ok' : 'muted';
  });
}

document.getElementById('btnAccounts').addEventListener('click', readAccounts);
document.getElementById('btnChain').addEventListener('click', readChain);
document.getElementById('btnBalance').addEventListener('click', readBalance);

if (typeof window.ethereum === 'undefined') {
  log('未检测到钱包，请安装 MetaMask 后刷新。', 'err');
} else {
  log('已检测到钱包。以上按钮均为只读查询，不会弹窗、不会花费资产。', 'muted');
}
</script>
</body>
</html>
