<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>01 · 检测 Provider（Detect Provider）</title>
<style>
  :root{--bg:#0f1420;--card:#1a2232;--fg:#e6edf3;--muted:#8b98a9;--accent:#f6851b;--ok:#3fb950;--err:#f85149;--border:#2d3648}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--fg);line-height:1.6;padding:24px}
  .wrap{max-width:820px;margin:0 auto}
  h1{font-size:1.5rem} h2{font-size:1.1rem;border-bottom:1px solid var(--border);padding-bottom:6px;margin-top:28px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin:16px 0}
  button{background:var(--accent);color:#111;border:0;border-radius:8px;padding:10px 16px;font-weight:600;cursor:pointer;font-size:.95rem;margin:4px 6px 4px 0}
  button:hover{opacity:.9} button:disabled{opacity:.4;cursor:not-allowed}
  pre{background:#0b0f17;border:1px solid var(--border);border-radius:8px;padding:14px;overflow:auto;font-size:.85rem}
  code{color:var(--accent)}
  .row{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
  .kv{display:grid;grid-template-columns:200px 1fr;gap:8px;font-size:.9rem}
  .kv div:nth-child(odd){color:var(--muted)}
  input{background:#0b0f17;border:1px solid var(--border);color:var(--fg);border-radius:6px;padding:8px;font-size:.9rem;width:100%}
  .ok{color:var(--ok)} .err{color:var(--err)} .muted{color:var(--muted)}
  .warn{background:#3a2a12;border:1px solid #7a5a24;border-radius:8px;padding:12px;font-size:.9rem}
  #log{min-height:60px}
</style>
</head>
<body>
<div class="wrap">
  <h1>01 · 检测 Provider（Detect Provider）</h1>
  <p class="muted">页面加载即检测浏览器里有没有注入的钱包（window.ethereum），并判断它是谁。</p>

  <div class="warn">
    ⚠️ 本模块只做<strong>只读检测</strong>，不会连接钱包、不会弹窗、不会暴露你的地址。检测钱包本身是安全的。
  </div>

  <!-- 检测结果卡片 -->
  <div class="card">
    <div class="row">
      <button id="btnDetect">重新检测</button>
      <span id="status" class="muted">检测中…</span>
    </div>
    <div class="kv" id="kv" style="margin-top:14px"></div>
  </div>

  <!-- 日志输出卡片 -->
  <div class="card">
    <h2 style="margin-top:0;border:0">检测日志</h2>
    <pre id="log"></pre>
  </div>
</div>

<script>
// ======================================================================
// 模块 01：检测 Provider
// ----------------------------------------------------------------------
// 核心概念：
//   钱包插件（如 MetaMask）在页面里注入一个全局对象 window.ethereum，
//   它遵循 EIP-1193 标准，暴露一个统一的方法 provider.request({method, params})。
//   我们只要判断 window.ethereum 存不存在，就知道浏览器里有没有装钱包。
// ======================================================================

// 取到页面上的几个 DOM 节点，后面反复用
const logEl = document.getElementById('log');     // 日志输出区
const kvEl = document.getElementById('kv');        // 键值对展示区
const statusEl = document.getElementById('status'); // 顶部状态文字

// 往日志区追加一行文字（带时间戳），是本系列最常用的小工具函数
function log(msg, cls) {
  const time = new Date().toLocaleTimeString();
  const line = document.createElement('div');
  if (cls) line.className = cls;         // cls 可为 'ok' / 'err' / 'muted'
  line.textContent = `[${time}] ${msg}`;
  logEl.appendChild(line);
}

// 往键值对区渲染一行「标签 : 值」
function kv(label, value, cls) {
  const k = document.createElement('div');
  k.textContent = label;
  const v = document.createElement('div');
  if (cls) v.className = cls;
  v.textContent = value;
  kvEl.appendChild(k);
  kvEl.appendChild(v);
}

// 核心检测函数
function detect() {
  // 每次检测前先清空上一轮的结果
  kvEl.innerHTML = '';
  logEl.innerHTML = '';
  log('开始检测 window.ethereum …');

  // ① 判断 window.ethereum 是否存在。
  //    typeof 判断可以避免变量未定义时直接报 ReferenceError。
  const eth = window.ethereum;
  const hasProvider = typeof eth !== 'undefined' && eth !== null;

  kv('window.ethereum 存在', hasProvider ? '是 ✅' : '否 ❌', hasProvider ? 'ok' : 'err');

  if (!hasProvider) {
    // 没有注入对象 = 没装钱包（或钱包被禁用）
    statusEl.textContent = '未检测到钱包，请安装 MetaMask';
    statusEl.className = 'err';
    log('未检测到 window.ethereum。请安装 MetaMask 或其它兼容 EIP-1193 的钱包。', 'err');
    log('MetaMask 下载地址：https://metamask.io/download/', 'muted');
    return;
  }

  // ② 判断是不是 MetaMask。
  //    钱包会用 isXxx 布尔标记标注自己，MetaMask 用的是 isMetaMask。
  //    注意：这个标记只能当参考，不能当安全依据（其它钱包也可能伪装 isMetaMask）。
  const isMetaMask = !!eth.isMetaMask;
  kv('isMetaMask', isMetaMask ? '是' : '否（可能是其它钱包）', isMetaMask ? 'ok' : 'muted');

  // ③ 判断是否存在多插件冲突。
  //    当浏览器同时装了多个钱包插件时，它们会互相争抢 window.ethereum。
  //    有些实现会把所有 provider 收集到 window.ethereum.providers 数组里。
  //    这时 window.ethereum 具体指向谁是不确定的 —— 这正是 EIP-6963 要解决的问题（见模块 09）。
  const providers = eth.providers;
  const hasProvidersArray = Array.isArray(providers);
  kv('存在 providers 数组', hasProvidersArray ? `是（${providers.length} 个）⚠️` : '否', hasProvidersArray ? 'err' : 'ok');

  if (hasProvidersArray) {
    log(`检测到多个 provider（${providers.length} 个），说明装了不止一个钱包插件，它们在争抢 window.ethereum。`, 'err');
    log('基础做法下 window.ethereum 指向谁不确定，现代做法应改用 EIP-6963 逐个发现钱包（模块 09 细讲）。', 'muted');
    // 逐个打印每个 provider 的身份标记，方便观察
    providers.forEach((p, i) => {
      const tag = p.isMetaMask ? 'MetaMask' : (p.isCoinbaseWallet ? 'Coinbase' : '未知钱包');
      log(`  providers[${i}] → ${tag}`, 'muted');
    });
  }

  // ④ 顺带展示 navigator 环境信息，帮助判断是不是在移动端 App 内置浏览器里
  kv('User Agent', navigator.userAgent, 'muted');

  // 汇总结论
  if (isMetaMask && !hasProvidersArray) {
    statusEl.textContent = '已检测到 MetaMask ✅';
    statusEl.className = 'ok';
    log('结论：检测到唯一的 MetaMask provider，环境干净，可以进入下一模块「连接账户」。', 'ok');
  } else if (hasProvidersArray) {
    statusEl.textContent = '检测到多个钱包，存在冲突 ⚠️';
    statusEl.className = 'err';
  } else {
    statusEl.textContent = '检测到钱包（非 MetaMask）';
    statusEl.className = 'ok';
    log('结论：检测到一个兼容 EIP-1193 的钱包，但它不是 MetaMask。', 'muted');
  }
}

// 页面一加载就自动检测一次
detect();
// 「重新检测」按钮再次触发检测（比如你刚装完钱包刷新页面）
document.getElementById('btnDetect').addEventListener('click', detect);
</script>
</body>
</html>
