<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>07 · 通过钱包发送交易 eth_sendTransaction</title>
<style>
:root{--bg:#0f1420;--card:#1a2232;--fg:#e6edf3;--muted:#8b98a9;--accent:#f6851b;--ok:#3fb950;--err:#f85149;--border:#2d3648}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--fg);line-height:1.6;padding:24px}
.wrap{max-width:820px;margin:0 auto}h1{font-size:1.5rem}h2{font-size:1.1rem;border-bottom:1px solid var(--border);padding-bottom:6px;margin-top:28px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin:16px 0}
button{background:var(--accent);color:#111;border:0;border-radius:8px;padding:10px 16px;font-weight:600;cursor:pointer;font-size:.95rem;margin:4px 6px 4px 0}
button:hover{opacity:.9}button:disabled{opacity:.4;cursor:not-allowed}
pre{background:#0b0f17;border:1px solid var(--border);border-radius:8px;padding:14px;overflow:auto;font-size:.85rem}
code{color:var(--accent)}input{background:#0b0f17;border:1px solid var(--border);color:var(--fg);border-radius:6px;padding:8px;font-size:.9rem;width:100%}
.ok{color:var(--ok)}.err{color:var(--err)}.muted{color:var(--muted)}
.warn{background:#3a2a12;border:1px solid #7a5a24;border-radius:8px;padding:12px;font-size:.9rem}#log{min-height:60px}
label{display:block;margin:10px 0 4px;font-size:.85rem;color:var(--muted)}
a{color:var(--accent)}
</style></head><body><div class="wrap">
<h1>07 · 通过钱包发送交易 <code>eth_sendTransaction</code></h1>
<p class="muted">dApp 只发起请求，真正的签名、广播由 MetaMask 完成，用户在弹窗里确认金额与 gas。</p>

<div class="warn">
⚠️ <b>本页仅用于 Sepolia 测试网。</b>发送真实交易会消耗测试币。发送前请务必核对下方的<b>收款地址</b>和<b>金额</b>——真实 dApp 也可能被篡改，签名前永远以钱包弹窗显示的内容为准。
</div>

<div class="card">
  <h2>① 检测与连接</h2>
  <button id="btnConnect">连接钱包</button>
  <button id="btnSwitch">切换到 Sepolia</button>
  <p>当前账户：<code id="acc">未连接</code></p>
  <p>当前网络 chainId：<code id="chain">-</code> <span id="chainName" class="muted"></span></p>
</div>

<div class="card">
  <h2>② 发送交易</h2>
  <label for="to">收款地址 to（默认填成你自己的地址，自己给自己转）</label>
  <input id="to" placeholder="0x..." />
  <label for="amount">金额（单位 ETH，Sepolia 测试币）</label>
  <input id="amount" value="0.0001" />
  <div style="margin-top:12px">
    <button id="btnSend" disabled>发送交易</button>
  </div>
  <p class="muted" style="font-size:.82rem">按钮会在「已连接 + 网络为 Sepolia」时才可用。</p>
</div>

<div class="card">
  <h2>③ 日志</h2>
  <pre id="log">等待操作...</pre>
</div>
</div>

<script>
/* =========================================================================
 * 07 · eth_sendTransaction —— 通过钱包发起一笔转账交易
 *
 * 核心概念：
 *  - eth_call / eth_getBalance 等是「只读」调用，不改变链上状态、不花钱、不弹窗。
 *  - eth_sendTransaction 是「写」操作：会改变链上状态（转账/调合约），
 *    需要用私钥签名并广播。dApp 没有私钥，所以只是把交易参数交给钱包，
 *    由 MetaMask 弹窗让用户确认 gas 与金额，用户点确认后钱包才签名并广播。
 *  - 返回值是交易哈希 txHash（0x 开头），此时交易只是「已广播」，
 *    还没被打包上链，需要再查 receipt 或去区块浏览器确认。
 * ========================================================================= */

const SEPOLIA = '0xaa36a7';           // 11155111 的十六进制，Sepolia 测试网 chainId
const $ = (id) => document.getElementById(id);
const provider = window.ethereum;     // EIP-1193 provider（MetaMask 注入）

// 往日志区追加一行，type 控制颜色
function log(msg, type) {
  const cls = type ? ` class="${type}"` : '';
  const t = new Date().toLocaleTimeString();
  $('log').innerHTML = `<span${cls}>[${t}] ${msg}</span>\n` + $('log').innerHTML;
}

let account = null;   // 当前连接的账户地址
let chainId = null;   // 当前网络 chainId（0x 字符串）

// 页面加载先检测环境
if (!provider) {
  log('未检测到 window.ethereum，请安装 MetaMask 浏览器插件后刷新。', 'err');
  $('btnConnect').disabled = true;
} else {
  log('已检测到注入的 provider，可以开始连接。', 'ok');
}

// 根据「是否连接 + 是否在 Sepolia」决定发送按钮是否可用（这是本模块的强制校验）
function refreshSendBtn() {
  const ready = !!account && chainId === SEPOLIA;
  $('btnSend').disabled = !ready;
  if (account && chainId !== SEPOLIA) {
    log('当前不在 Sepolia，请先点「切换到 Sepolia」才能发送。', 'err');
  }
}

// 读取当前 chainId，更新界面
async function refreshChain() {
  chainId = await provider.request({ method: 'eth_chainId' });
  $('chain').textContent = chainId;
  $('chainName').textContent = chainId === SEPOLIA ? '(Sepolia 测试网 ✓)' : '(非 Sepolia，请切换)';
  refreshSendBtn();
}

// 连接钱包：请求授权账户
$('btnConnect').onclick = async () => {
  try {
    const accounts = await provider.request({ method: 'eth_requestAccounts' });
    account = accounts[0];
    $('acc').textContent = account;
    // 收款地址默认填成自己，方便自己给自己转账做测试
    if (!$('to').value) $('to').value = account;
    log('已连接：' + account, 'ok');
    await refreshChain();
  } catch (e) {
    // 4001 = 用户在弹窗里拒绝
    if (e.code === 4001) log('你拒绝了连接请求（error.code=4001）。', 'err');
    else log('连接失败：' + (e.message || e), 'err');
  }
};

// 切换到 Sepolia（wallet_switchEthereumChain）
$('btnSwitch').onclick = async () => {
  try {
    await provider.request({
      method: 'wallet_switchEthereumChain',
      params: [{ chainId: SEPOLIA }],
    });
    log('已切换到 Sepolia。', 'ok');
    await refreshChain();
  } catch (e) {
    if (e.code === 4001) log('你拒绝了切换网络（4001）。', 'err');
    else log('切换失败（钱包里可能没有 Sepolia，需先添加）：' + (e.message || e), 'err');
  }
};

// 把「以 ETH 计的金额」转成「十六进制的 wei」
// 1 ETH = 1e18 wei；value 字段要求十六进制字符串
function ethToHexWei(ethStr) {
  // 用字符串手工处理小数，避免 Number 浮点精度丢失
  const [intPart, decPartRaw = ''] = String(ethStr).trim().split('.');
  const decPart = (decPartRaw + '0'.repeat(18)).slice(0, 18); // 补齐/截断到 18 位小数
  const weiStr = (intPart || '0') + decPart;                  // 拼成整数字符串（单位 wei）
  const wei = BigInt(weiStr);                                 // 用 BigInt 保证精度
  return '0x' + wei.toString(16);                             // 转十六进制
}

// 发送交易
$('btnSend').onclick = async () => {
  // 再次做安全校验：必须在 Sepolia
  if (chainId !== SEPOLIA) { log('拒绝发送：当前不是 Sepolia。', 'err'); return; }

  const to = $('to').value.trim();
  const amount = $('amount').value.trim();
  if (!/^0x[0-9a-fA-F]{40}$/.test(to)) { log('收款地址格式不正确。', 'err'); return; }

  let valueHex;
  try { valueHex = ethToHexWei(amount); }
  catch { log('金额格式不正确。', 'err'); return; }

  // 组装交易参数。注意 params 是一个「数组，里面一个交易对象」
  const tx = {
    from: account,   // 发起方（必须是当前账户）
    to,              // 收款地址
    value: valueHex, // 金额：十六进制 wei
    // gas 可以不填，MetaMask 会自动估算；data 转账时留空（若调用合约则放 calldata）
  };

  log(`准备发送：向 ${to} 转 ${amount} ETH（value=${valueHex} wei）。请在 MetaMask 弹窗确认。`);

  try {
    // 关键调用：钱包弹窗 → 用户确认 gas → 钱包签名并广播 → 返回 txHash
    const txHash = await provider.request({
      method: 'eth_sendTransaction',
      params: [tx],
    });
    log('已广播！txHash = ' + txHash, 'ok');
    const url = 'https://sepolia.etherscan.io/tx/' + txHash;
    $('log').innerHTML =
      `<span class="ok">[${new Date().toLocaleTimeString()}] 在区块浏览器查看：` +
      `<a href="${url}" target="_blank" rel="noopener">${url}</a></span>\n` + $('log').innerHTML;

    // 演示：轮询交易回执（receipt），receipt 不为 null 即表示已上链
    pollReceipt(txHash);
  } catch (e) {
    if (e.code === 4001) log('你在弹窗里拒绝了交易（error.code=4001），未发送。', 'err');
    else log('发送失败：' + (e.message || e), 'err');
  }
};

// 轮询交易回执：拿到 txHash 后，交易还没上链，需要等待被矿工打包
async function pollReceipt(txHash, tries = 0) {
  if (tries > 20) { log('等待回执超时，可稍后去区块浏览器查看。', 'muted'); return; }
  const receipt = await provider.request({
    method: 'eth_getTransactionReceipt',
    params: [txHash],
  });
  if (receipt) {
    // status: '0x1' 成功，'0x0' 失败（如合约 revert）
    const ok = receipt.status === '0x1';
    log(`交易已上链！区块 ${parseInt(receipt.blockNumber, 16)}，状态：` +
        (ok ? '成功 ✓' : '失败 ✗'), ok ? 'ok' : 'err');
  } else {
    setTimeout(() => pollReceipt(txHash, tries + 1), 3000); // 3 秒后再查
  }
}
</script>
</body></html>
